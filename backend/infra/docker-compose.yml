services:
  api:
    container_name: jogo-popcorn-api
    restart: always
    cpu_shares: 2
    mem_limit: 250m
    image: gsachetto/jogo-popcorn-api:1.3
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_PASS: ${DB_PASS}
      DB_USER: ${DB_USER}
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_PORT: ${DB_PORT}
      API_PORT: ${API_PORT}
    networks:
      - internal
      - external
    ports:
      - ${API_PORT}:${API_PORT}

  database:
    restart: always
    cpu_shares: 2
    mem_limit: 200m
    image: postgres:latest
    container_name: jogo-popcorn-db
    volumes:
      - ${DB_VOLUME}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${DB_USER} -d ${DB_NAME}'"]
      interval: 5s
      timeout: 10s
      retries: 3
    networks:
      - internal
    environment:
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - ${DB_PORT}:${DB_PORT}

networks:
  internal:
    driver: ipvlan
  external:
    driver: bridge